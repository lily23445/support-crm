<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support CRM — Customer Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:999px; font-size:12px; font-weight:500; }
    .badge-open       { background:#EFF6FF; color:#1D4ED8; }
    .badge-inprogress { background:#FFFBEB; color:#B45309; }
    .badge-closed     { background:#F0FDF4; color:#15803D; }
    .badge-default    { background:#F1F5F9; color:#475569; }
    .field { width:100%; border:1px solid #E2E8F0; border-radius:8px; padding:10px 12px; font-size:14px; outline:none; transition:border-color .15s; }
    .field:focus { border-color:#2563EB; }
    .field::placeholder { color:#CBD5E1; }
    .note-card { border:1px solid #E2E8F0; border-radius:10px; padding:12px 14px; }
    .note-ts   { font-size:11px; color:#94A3B8; margin-bottom:4px; }
    .note-text { font-size:14px; color:#1E293B; margin:0; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">

  <!-- HEADER -->
  <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-lg bg-slate-900 flex items-center justify-center text-white text-sm font-bold">S</div>
        <div>
          <span class="font-semibold text-slate-900 text-sm">Support CRM</span>
          <span class="text-slate-400 text-sm ml-2">· Customer Portal</span>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-6 py-10">
    <div class="grid lg:grid-cols-2 gap-8 items-start">

      <!-- LEFT — NEW TICKET -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100">
          <h2 class="font-semibold text-slate-900">New Ticket</h2>
          <p class="text-slate-500 text-sm mt-0.5">Describe your issue and we'll get back to you.</p>
        </div>
        <div class="px-6 py-5">
          <form id="submitForm" class="space-y-4" novalidate>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Customer name</label>
              <input id="customer_name" type="text" required class="field" placeholder="Jane Doe">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Customer email</label>
              <input id="customer_email" type="email" required class="field" placeholder="jane@acme.com">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Subject</label>
              <input id="subject" type="text" required class="field" placeholder="Cannot log in to my account">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
              <textarea id="description" rows="4" required class="field resize-none" placeholder="Tell us what happened…"></textarea>
            </div>
            <button id="submitBtn" type="submit"
              class="w-full bg-slate-900 hover:bg-slate-700 text-white text-sm font-medium py-2.5 rounded-xl transition">
              Submit Ticket
            </button>
          </form>

          <div id="submitSuccess" class="hidden mt-4 rounded-xl bg-green-50 border border-green-200 px-4 py-3">
            <p class="text-sm font-semibold text-green-800">Ticket submitted</p>
            <p class="text-sm text-green-700 mt-0.5">
              Your ticket ID is <span id="newTicketId" class="font-bold"></span> — save it to track updates.
            </p>
          </div>
          <div id="submitError" class="hidden mt-4 rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>
        </div>
      </div>

      <!-- RIGHT — TRACK TICKET -->
      <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
        <div class="px-6 py-5 border-b border-slate-100">
          <h2 class="font-semibold text-slate-900">Track Ticket</h2>
          <p class="text-slate-500 text-sm mt-0.5">Enter your ticket ID and email to see updates.</p>
        </div>
        <div class="px-6 py-5">
          <form id="lookupForm" class="space-y-4" novalidate>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Ticket ID</label>
              <input id="lookup_ticket_id" type="text" required class="field" placeholder="TKT-0001">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Email address</label>
              <input id="lookup_email" type="email" required class="field" placeholder="jane@acme.com">
            </div>
            <button id="lookupBtn" type="submit"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium py-2.5 rounded-xl transition">
              Track Ticket
            </button>
          </form>

          <div id="lookupError" class="hidden mt-4 rounded-xl bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700"></div>

          <!-- Result -->
          <div id="lookupResult" class="hidden mt-6 pt-6 border-t border-slate-100">

            <div class="flex items-start justify-between gap-3 mb-4">
              <div>
                <div class="flex items-center gap-2 mb-1">
                  <span class="font-mono text-xs font-semibold text-slate-400" id="result_ticket_id"></span>
                  <span id="statusBadge" class="badge"></span>
                </div>
                <p class="font-semibold text-slate-900 text-base" id="result_subject"></p>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-3 mb-5">
              <div class="bg-slate-50 rounded-xl px-3 py-2.5">
                <p class="text-xs text-slate-400 mb-0.5">Customer</p>
                <p class="text-sm font-medium text-slate-800" id="result_customer"></p>
              </div>
              <div class="bg-slate-50 rounded-xl px-3 py-2.5">
                <p class="text-xs text-slate-400 mb-0.5">Email</p>
                <p class="text-sm font-medium text-slate-800 truncate" id="result_email"></p>
              </div>
              <div class="bg-slate-50 rounded-xl px-3 py-2.5 col-span-2">
                <p class="text-xs text-slate-400 mb-0.5">Description</p>
                <p class="text-sm text-slate-700" id="result_description"></p>
              </div>
              <div class="bg-slate-50 rounded-xl px-3 py-2.5 col-span-2">
                <p class="text-xs text-slate-400 mb-0.5">Opened</p>
                <p class="text-sm text-slate-700" id="result_created"></p>
              </div>
            </div>

            <div class="flex items-center justify-between mb-3">
              <p class="text-xs font-semibold uppercase tracking-wider text-slate-400">Activity timeline</p>
              <span id="noteCount" class="text-xs text-slate-400"></span>
            </div>
            <div id="notesContainer" class="space-y-3"></div>

          </div>
        </div>
      </div>

    </div>
  </main>

  <script src="public.js"></script>
</body>
</html>
